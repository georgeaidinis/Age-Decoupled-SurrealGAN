experiment_name = "age-decoupled-surrealgan"

[paths]
raw_dataset = "datasets/cleaned_istaging.csv"
muse_roi_json = "datasets/MUSE_ROI_complete_list.json"
atlas_image = "datasets/atlas.nii.gz"
atlas_segmentation = "datasets/atlas_segmentation.nii.gz"
processed_dir = "artifacts/data/processed"
runs_dir = "runs"
notebook_dir = "output/jupyter-notebook"

[data]
subject_id_column = "PTID"
study_column = "Study"
age_column = "Age"
diagnosis_column = "Diagnosis"
sex_column = "Sex"
roi_prefix = "MUSE_Volume_"
max_atomic_roi_id = 299
ref_min_age = 20
ref_max_age = 49
tar_min_age = 50
tar_max_age = 97
holdout_study = "HANDLS"
val_fraction = 0.10
id_test_fraction = 0.10
split_seed = 17
age_latent_normalization_min = 20
age_latent_normalization_max = 97
roi_normalization = "zscore"
roi_normalization_std_scale = 1.0
roi_normalization_clip = 6.0
roi_normalization_epsilon = 0.000001

[model]
n_processes = 5
age_latent_dim = 1
encoder_hidden_dims = [512, 256]
generator_hidden_dims = [512, 512, 256]
discriminator_hidden_dims = [512, 256]
decomposer_hidden_dims = [512, 256]
dropout = 0.10
process_separation_margin = 0.15

[training]
repetitions = 3
epochs = 50
batch_size = 64
learning_rate = 0.0002
discriminator_learning_rate = 0.0001
weight_decay = 0.0001
gradient_clip_norm = 5.0
num_workers = 0
persistent_workers = false
use_amp = false
compile_model = false
device = "auto"
save_every = 0
target_regular_checkpoints = 3
log_every = 10
console_log_every = 1
monitor_split = "val"
monitor_metric = "collapse_aware_quality_score"
sensitivity_eval_subjects = 64
sensitivity_process_anchor_age = 20.0
resume_run_dir = ""
sampled_process_one_hot_only = true
low_activation_max = 0.05

[losses]
adversarial = 1.0
age_supervision = 4.0
reference_age_supervision = 2.0
age_adversary = 1.0
latent_reconstruction = 2.0
decomposition = 2.0
identity = 1.0
monotonicity = 0.75
process_orthogonality = 0.25
age_process_covariance = 0.25
reference_process_sparsity = 0.10
change_magnitude = 0.10
low_activation_identity = 0.25
process_age_correlation = 0.10
process_latent_sparsity = 0.05
low_activation_max = 0.05
age_sensitivity = 0.50
process_sensitivity = 1.00
age_sensitivity_target_pct = 0.25
process_sensitivity_target_pct = 0.10
age_shrinkage = 0.0
process_shrinkage = 0.0
generator_process_separation = 1.0
generator_process_redundancy = 1.0
process_latent_pairwise_correlation = 0.5

[tuning]
enabled = true
trials = 20
study_name = "age_decoupled_surrealgan"
storage = "sqlite:///runs/optuna_age_decoupled_surrealgan.db"
resume_if_exists = true
objective_metric = "collapse_aware_quality_score"
generator_process_separation_min = 0.1
generator_process_separation_max = 1.0
generator_process_redundancy_min = 0.1
generator_process_redundancy_max = 1.0
process_latent_pairwise_correlation_min = 0.0
process_latent_pairwise_correlation_max = 0.6

[app]
api_host = "127.0.0.1"
api_port = 8000
allow_origin = "*"
