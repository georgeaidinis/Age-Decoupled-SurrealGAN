experiment_name = "scenario-redesign-disentangle-5"

[model]
n_processes = 5
encoder_hidden_dims = [640, 320]
generator_hidden_dims = [640, 640, 320]
discriminator_hidden_dims = [512, 256]
decomposer_hidden_dims = [640, 320]
dropout = 0.10
process_separation_margin = 0.22

[training]
repetitions = 5
epochs = 110
batch_size = 128
learning_rate = 0.00014
discriminator_learning_rate = 0.00008
monitor_metric = "collapse_aware_quality_score"
sensitivity_eval_subjects = 128
sensitivity_process_anchor_age = 50.0

[losses]
adversarial = 1.0
age_supervision = 4.5
reference_age_supervision = 2.0
age_adversary = 1.10
latent_reconstruction = 2.75
decomposition = 2.75
identity = 0.80
monotonicity = 1.0
process_orthogonality = 0.50
age_process_covariance = 0.45
reference_process_sparsity = 0.08
change_magnitude = 0.05
low_activation_identity = 0.35
process_age_correlation = 0.25
process_latent_sparsity = 0.10
age_sensitivity = 0.40
process_sensitivity = 1.25
age_sensitivity_target_pct = 0.25
process_sensitivity_target_pct = 0.18
age_shrinkage = 0.0
process_shrinkage = 0.0
generator_process_separation = 1.30
generator_process_redundancy = 1.40
process_latent_pairwise_correlation = 1.00
