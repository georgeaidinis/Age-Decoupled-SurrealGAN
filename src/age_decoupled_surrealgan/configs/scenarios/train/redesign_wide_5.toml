experiment_name = "scenario-redesign-wide-5"

[model]
n_processes = 5
encoder_hidden_dims = [768, 384]
generator_hidden_dims = [768, 768, 384]
discriminator_hidden_dims = [640, 320]
decomposer_hidden_dims = [768, 384]
dropout = 0.08
process_separation_margin = 0.20

[training]
repetitions = 5
epochs = 100
batch_size = 160
learning_rate = 0.000125
discriminator_learning_rate = 0.00006
monitor_metric = "collapse_aware_quality_score"
sensitivity_eval_subjects = 160
sensitivity_process_anchor_age = 50.0

[losses]
adversarial = 1.0
age_supervision = 4.0
reference_age_supervision = 2.0
age_adversary = 0.75
latent_reconstruction = 2.5
decomposition = 2.5
identity = 0.75
monotonicity = 1.0
process_orthogonality = 0.35
age_process_covariance = 0.25
reference_process_sparsity = 0.05
change_magnitude = 0.05
low_activation_identity = 0.35
process_age_correlation = 0.15
process_latent_sparsity = 0.05
age_sensitivity = 0.55
process_sensitivity = 1.6
age_sensitivity_target_pct = 0.25
process_sensitivity_target_pct = 0.20
age_shrinkage = 0.0
process_shrinkage = 0.0
generator_process_separation = 1.35
generator_process_redundancy = 1.35
process_latent_pairwise_correlation = 0.75
